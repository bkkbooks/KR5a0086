front:
  text: 太上祕法鎮宅靈符張八謹按上元經云昔漢孝文皇帝問天老曰人家謂有三愚之宅者何天老答曰三愚之宅者其宅前高後低者為一愚北有流水者為二愚東南高西北平為三愚帝忽因一日私行至弘農縣界見一家正住三愚之宅其宅甚是豪冨大小五十餘口帝嘆訝非常而回宫內至來日遂詔隂賜官二人更換衣服三人同至其家門首欲問其宅因由門人一見即執主人門前有三人欲求相見進平聞之急令請入邀於㕔上主客禮畢就廰而坐進平置酒飲酒之次帝問主人曰何姓答曰姓劉名進平又問曰住此宅得幾多年進平答曰住此宅令經三十餘年帝曰謹按宅經云此宅正係三愚之宅其地大凶人不可居之有何方術而成安吉之宅願聞之進平答曰一自初居此宅甚見灾禍損耗財物傷折人口官病連年六畜不安大小不寧貧乏甚至忽於一日天將欲晚有二書生不知從何方來本家投宿謁食進平緣為家貧只有些小糜粥以供二生食畢遂問進平此宅甚凶何得居之進平對曰實為家負遷移不得二生曰吾有法術教公鎮宅不須移動進平拜告蒙賜法術願聽教矣其二生即傳此七十二道鎮宅靈符遂云鎮宅十年大冨貴二十年子孫昌盛三十年必有白衣天子入宅所驗一一見之但只有白衣天子未見其驗文帝笑而問曰二生何在進平對曰傳符法了便辭而去出門約五十步不見惟有白氣一道上天而去帝曰符其可得而聞乎進平於是將符即時進上文帝遂獲此符回宫勑令奉行此符傳於天下鎮宅普護家家清吉户户康寧上真垂佑灾害不生福壽增延子孫榮顯田蠶倍盛六畜興生掃除精怪蕩滅妖氛靈符祕妙永鎮門庭此符靈驗來歷甚多述之難盡爰用鋟梓以廣其傳云璇璣八卦之圖厭釜鳴狗上牀斬火光一切鬼厭除氣運隂陽不和厭猪猫大等自食子怪厭除口舌惡事侵害厭除禍害之鬼厭除凶殃侵害之鬼厭刀兵衰耗之鬼厭鎮凶惡之鬼厭牛馬六畜死傷鬼招金銀入宅冨貴不逢殃禍厭除風火之怪厭盜賊口舌無端之鬼厭水潦火光怪厭雞夜嗚百怪之鬼厭不宜男女長命厭時氣不和惡事滅厭橫損財謀害之鬼厭亡失克害人口之鬼
