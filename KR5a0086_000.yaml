body:
  text: 一厭惡鬼厭除養蠶不成之鬼厭牲畜物損傷人之鬼厭飛尸鬼侵害人口厭惡夢經求無利息北符大招官職宜官職斬伏尸為禍厭西方土氣損人口厭除北方土氣耗損之鬼厭伏尸鬼損害人口厭南方土氣害人口盜賊不侵萬事稱意厭除家鬼克害人口厭除口舌疾病之灾厭中央土氣移動鬼龍神非佛此符大招經求遂意厭大雞狐狸鳴上屋招金銀自入大冨貴厭蛇蟲作諸怪𥚢保宅舍門户人口清吉厭神祠精𩲙鬼厭煞星厭除發狂萬物之精厭東方土氣精耗鬼厭除官刑獄鬼厭老樹木作精魅鬼厭鬼怪不時呼人姓名厭盜賊驚恐人厭除淫祠奸惡之鬼三光百靈雷電不侵厭伏尸蛀煞鬼厭除太歲疾疫之侵厭不宜田蠶疾病之鬼厭天返地覆馬不生兒之鬼厭百怪口舌之鬼厭官司呼喚火速事厭蛇鼠食蠶夫婦反目不和事辟邪驅鬼復正保家田蠶六畜蕃息厭疫氣百雜鬼厭除百鬼不得害人厭夢寐驚人鬼冝子孫大貴和睦長命厭産育男女胎衣血腥不淨鬼厭除疾病連綿之鬼厭牛馬六畜死奴婢逃亡之鬼厭疾病盜賊虛耗之鬼厭驚恐人之鬼厭病患沈重滅福短壽之鬼除腹脹飲食不下鬼厭産耗鬼不來尅害厭丘冢伏尸疾病鬼厭不祥牛畜生産鬼每月聖降之日正月初七日二月初八日三月初三日聖誕初九日四月初四日五月初五日六月初七日七月初七日八月十三日九月初九日十月二十一日十一月初七日十二月二十七日供養之儀箋沈降真各只宜一炷不宜合和悉有麝木樨栀子梅花松柏淨茶棗湯忌食鴈鰻龜黿黑鯉鰌鱔生葱韭蒜荽牛犬太上祕法鎮宅靈符
